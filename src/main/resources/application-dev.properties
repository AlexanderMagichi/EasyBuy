# Development profile properties
# This profile intentionally disables Spring Security for local development.
# TODO: REMOVE OR CHANGE BEFORE PRODUCTION — re-enable security and remove this file or its
# exclusions.

# Exclude Spring Security auto-configuration as a safety fallback. The application's
# SecurityConfig is also annotated with @Profile("!dev") to prevent it from loading.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Helpful reminder: run the app with -Dspring.profiles.active=dev or set SPRING_PROFILES_ACTIVE=dev
# Example: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev

